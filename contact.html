    <body>
        <div id="contact" class="big-bg">
            <header class="page-header wrapper">
                <h1><a href="index.html"><img class="logo" src="images/logo.svg" alt="Café ORGANICA"></a></h1>
                <nav>
                    <ul class="main-nav">
                        <li><a href="news.html">news</a></li>
                        <li><a href="menu.html">menu</a></li>
                        <li><a href="contact.html">contact</a></li>
                    </ul>
                </nav>
            </header>

            <div class="contact wraper">
                <h2 class="page-title">Contact</h2>
                <form action="#">
                    <div>
                        <label for="name">お名前</label>
                        <input type="text" id="name" name="your-name">
                    </div>

                    <div>
                        <label for="email">メールアドレス</label>
                        <input type="email" id="email" name="your-email">
                    </div>

                    <div>
                        <label for="message">メッセージ</label>
                        <textarea id="message" name="your-message"></textarea>
                    </div>

                    <input type="submit" class="button" value="送信">

                    </form>

        </div><!--/#contact-->

        <section id="location">
            <div class="wrapper">
                <div class="location-info">
                    <h3 class="sub-title">Café ORGANICA</br> 東京駅前店</h3>
                    <p>
                        住所：東京都千代田区<br>
                        丸の内１丁目９−１<br>
                        JR東日本 東京駅構内<br>
                        電話: 03-1111-1111<br>
                        営業時間: 10:00~20:00<br>
                        休日：水曜
                    </p>
                </div><!-- /.location-info -->
                <div class="location-map">
                    <iframe src="https://www.google.com/maps/d/embed?mid=1M5UkdBSk3DGcFspJHi5nG9tdTpY8iAQ&ehbc=2E312F" width="640" height="480"></iframe>
                </div><!-- /.location-map-->
            </div><!-- /.wrapper -->
        </section><!-- /#location -->
 
        <section id="sns">
            <div class="wrapper">
                <div class="sns-book">

                </div>

                <div class="sns-box">
